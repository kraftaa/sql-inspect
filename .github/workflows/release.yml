name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: sql-inspect-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: sql-inspect-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sql-inspect dist/
          tar -C dist -czf "${{ matrix.archive_name }}" sql-inspect

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  checksums:
    name: Build checksums
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -type f -name "*.tar.gz" -print0 \
            | xargs -0 -I{} sh -c 'sha256sum "{}"' \
            > SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: SHA256SUMS

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, checksums]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/SHA256SUMS
